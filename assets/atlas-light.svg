<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="tokenctl architecture: Coding Agent traffic enters one Go binary — the proxy meters streamed tokens, the budget tree admits, throttles or preempts against an org-team-dev quota, then forwards to Claude/OpenAI/Bedrock; BoltDB persists counters and the audit log while Prometheus and tokenctl top expose live state">
  <defs>
    <marker id="ah-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#F5F5F7"/>

  <!-- single-binary frame -->
  <rect x="160" y="28" width="540" height="252" rx="18" fill="none" stroke="#5E5CE6" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="180" y="50" font-size="13" font-weight="600" fill="#4B3FC4">one static Go binary — no external DB, no queue, no second process</text>

  <!-- connectors -->
  <g stroke="#C9C9D0" stroke-width="1.6" fill="none">
    <line x1="148" y1="168" x2="186" y2="168" marker-end="url(#ah-l)"/>
    <line x1="356" y1="168" x2="394" y2="168" marker-end="url(#ah-l)"/>
    <line x1="566" y1="168" x2="722" y2="168" marker-end="url(#ah-l)"/>
  </g>
  <!-- meter feedback: tokens stream back from upstream into the tree -->
  <g stroke="#10A37F" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <path d="M748 196 C 748 248, 480 248, 480 200" marker-end="url(#ah-l)"/>
  </g>
  <text x="500" y="263" font-size="11" font-weight="600" fill="#0B6B53">SSE token deltas attributed back per leaf</text>
  <!-- store persistence link -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <line x1="480" y1="280" x2="480" y2="306" marker-end="url(#ah-l)"/>
  </g>

  <!-- Coding Agent -->
  <g>
    <rect x="24" y="120" width="124" height="96" rx="15" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="86" y="160" text-anchor="middle" font-size="14" font-weight="600" fill="#0A4F9E">Coding Agent</text>
    <text x="86" y="180" text-anchor="middle" font-size="11" fill="#6E6E73">Claude Code · Cursor</text>
    <text x="86" y="195" text-anchor="middle" font-size="11" fill="#6E6E73">Aider · Continue</text>
  </g>

  <!-- Proxy + Meter -->
  <g>
    <rect x="186" y="92" width="170" height="152" rx="15" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="271" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#0A4F9E">internal/proxy</text>
    <g font-size="11" fill="#4A4A52">
      <rect x="202" y="132" width="138" height="36" rx="9" fill="#0071E3" fill-opacity="0.08" stroke="#0071E3" stroke-width="1.1"/>
      <text x="271" y="154" text-anchor="middle" font-weight="600" fill="#0A4F9E">reverse proxy + TLS</text>
      <rect x="202" y="174" width="138" height="36" rx="9" fill="#0071E3" fill-opacity="0.08" stroke="#0071E3" stroke-width="1.1"/>
      <text x="271" y="196" text-anchor="middle" font-weight="600" fill="#0A4F9E">SSE token meter</text>
      <rect x="202" y="216" width="138" height="22" rx="7" fill="#0071E3" fill-opacity="0.06" stroke="#0071E3" stroke-width="1.0"/>
      <text x="271" y="231" text-anchor="middle" fill="#6E6E73">FlushInterval = -1</text>
    </g>
  </g>

  <!-- Budget Tree / Arbiter -->
  <g>
    <rect x="394" y="92" width="172" height="152" rx="15" fill="#5E5CE6" fill-opacity="0.10" stroke="#5E5CE6" stroke-width="1.6"/>
    <text x="480" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#4B3FC4">internal/budget</text>
    <g font-size="11.5">
      <rect x="410" y="132" width="140" height="26" rx="8" fill="#FFFFFF" fill-opacity="0.7" stroke="#5E5CE6" stroke-width="1.1"/>
      <text x="421" y="149" fill="#3a3551"><tspan font-weight="700" fill="#4B3FC4">admit</tspan>  org→team→dev</text>
      <rect x="410" y="164" width="140" height="26" rx="8" fill="#FFFFFF" fill-opacity="0.7" stroke="#5E5CE6" stroke-width="1.1"/>
      <text x="421" y="181" fill="#3a3551"><tspan font-weight="700" fill="#4B3FC4">throttle</tspan>  ≥ 80%</text>
      <rect x="410" y="196" width="140" height="26" rx="8" fill="#FFFFFF" fill-opacity="0.7" stroke="#5E5CE6" stroke-width="1.1"/>
      <text x="421" y="213" fill="#3a3551"><tspan font-weight="700" fill="#4B3FC4">deny</tspan>  429 + reason</text>
    </g>
    <text x="480" y="237" text-anchor="middle" font-size="10.5" fill="#6E6E73">weighted preemption + wallet arbiter</text>
  </g>

  <!-- Upstream providers -->
  <g>
    <rect x="722" y="92" width="134" height="152" rx="15" fill="#10A37F" fill-opacity="0.08" stroke="#10A37F" stroke-width="1.5"/>
    <text x="789" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#0B6B53">Upstream LLM</text>
    <g font-size="12" font-weight="600">
      <rect x="738" y="134" width="102" height="32" rx="8" fill="#10A37F" fill-opacity="0.16" stroke="#10A37F" stroke-width="1.1"/>
      <text x="789" y="155" text-anchor="middle" fill="#0B6B53">Claude</text>
      <rect x="738" y="172" width="102" height="32" rx="8" fill="#10A37F" fill-opacity="0.12" stroke="#10A37F" stroke-width="1.1"/>
      <text x="789" y="193" text-anchor="middle" fill="#0B6B53">OpenAI</text>
      <rect x="738" y="210" width="102" height="32" rx="8" fill="#10A37F" fill-opacity="0.08" stroke="#10A37F" stroke-width="1.1"/>
      <text x="789" y="231" text-anchor="middle" fill="#0B6B53">Bedrock</text>
    </g>
  </g>

  <!-- Store -->
  <g>
    <rect x="372" y="306" width="216" height="40" rx="12" fill="#475569" fill-opacity="0.10" stroke="#475569" stroke-width="1.5"/>
    <text x="480" y="324" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">internal/store · BoltDB</text>
    <text x="480" y="339" text-anchor="middle" font-size="10.5" fill="#6E6E73">windowed counters + append-only audit log</text>
  </g>

  <!-- Observability -->
  <g>
    <rect x="620" y="278" width="236" height="68" rx="13" fill="#10A37F" fill-opacity="0.07" stroke="#10A37F" stroke-width="1.4"/>
    <text x="738" y="300" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0B6B53">observability</text>
    <text x="738" y="319" text-anchor="middle" font-size="11" fill="#4A4A52">/metrics (Prometheus) · /v1/snapshot</text>
    <text x="738" y="335" text-anchor="middle" font-size="11" fill="#4A4A52">tokenctl top — live per-leaf burn</text>
  </g>
</svg>
